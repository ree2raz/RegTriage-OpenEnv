<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #f0f0f0; }
    .border { stroke: #2563eb; }
    .text { fill: #1f2937; font-family: system-ui, -apple-system, sans-serif; }
    .label { fill: #2563eb; }
    .line { stroke: #2563eb; }
    .subline { stroke: #d1d5db; }
    .dashed { stroke-dasharray: 4,3; }
  </style>
  <rect x="10" y="140" width="140" height="60" rx="6" class="box" stroke-width="1.5"/>
  <text x="80" y="165" text-anchor="middle" class="text" font-size="11" font-weight="600">Call Transcript</text>
  <text x="80" y="182" text-anchor="middle" class="text" font-size="9" opacity="0.6">12 scenarios</text>

  <line x1="150" y1="170" x2="185" y2="170" class="line" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="190" y="130" width="140" height="80" rx="6" class="box" stroke-width="1.5"/>
  <text x="260" y="158" text-anchor="middle" class="text" font-size="11" font-weight="600">PII Redaction</text>
  <text x="260" y="175" text-anchor="middle" class="text" font-size="9" opacity="0.6">SSN · Accounts · Names</text>
  <text x="260" y="190" text-anchor="middle" class="text" font-size="8" opacity="0.5">28 unit tests</text>

  <line x1="330" y1="170" x2="365" y2="170" class="line" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="370" y="50" width="240" height="260" rx="8" class="box" stroke-width="2"/>
  <text x="490" y="78" text-anchor="middle" class="label" font-size="13" font-weight="700">CallQAEnv</text>
  <line x1="390" y1="88" x2="590" y2="88" class="subline" stroke-width="1"/>

  <text x="400" y="112" class="text" font-size="9.5">1. get_call_metadata</text>
  <text x="400" y="130" class="text" font-size="9.5">2. get_sentiment_timeline</text>
  <text x="400" y="148" class="text" font-size="9.5">3. get_transcript_length</text>
  <text x="400" y="166" class="text" font-size="9.5">4. read_transcript_chunk</text>
  <text x="400" y="184" class="text" font-size="9.5">5. analyze_turn</text>
  <text x="400" y="202" class="text" font-size="9.5">6. flag_violation</text>
  <text x="400" y="220" class="text" font-size="9.5">7. submit_report</text>

  <rect x="390" y="238" width="200" height="28" rx="4" fill="none" class="subline" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="490" y="257" text-anchor="middle" class="text" font-size="9" opacity="0.7">Budget: 50 + turns × 3</text>

  <line x1="490" y1="310" x2="490" y2="335" class="line" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="390" y="340" width="200" height="40" rx="6" class="box" stroke-width="1.5"/>
  <text x="490" y="360" text-anchor="middle" class="text" font-size="10" font-weight="600">Severity-weighted F1</text>
  <text x="490" y="373" text-anchor="middle" class="text" font-size="8" opacity="0.6">auto-fail cap at 0.30</text>

  <line x1="610" y1="170" x2="650" y2="170" class="line" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="655" y="100" width="155" height="120" rx="6" class="box" stroke-width="1.5"/>
  <text x="732" y="125" text-anchor="middle" class="label" font-size="11" font-weight="700">Draft Incident Report</text>
  <line x1="670" y1="135" x2="795" y2="135" class="subline" stroke-width="1"/>
  <text x="672" y="155" class="text" font-size="9">ESCALATE → same-day SLA</text>
  <text x="672" y="172" class="text" font-size="9">REVIEW → next-day SLA</text>
  <text x="672" y="189" class="text" font-size="9">ARCHIVE → no review</text>
  <text x="672" y="210" class="text" font-size="8" opacity="0.6">AI scouts · Humans judge</text>

  <defs>
    <marker id="arrowhead" markerWidth="8" marker-height="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
</svg>